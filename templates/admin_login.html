<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion administrateur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    .password-wrapper {
      position: relative;
      margin-top: 12px;
    }

    input {
      width: 100%;
      padding: 12px 44px 12px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      user-select: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .error {
      margin-top: 15px;
      color: white;
      background: #c62828;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
      font-size: 18px;
      color: #1f4e79;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">OMNILUX – Administration</div>

    <h2>Connexion</h2>

    <form method="post" action="/admin/login">
      <div class="password-wrapper">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Mot de passe"
          required
        >
        <span class="toggle" onclick="togglePassword()">👁</span>
      </div>

      <button type="submit">Se connecter</button>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById("password");
      input.type = input.type === "password" ? "text" : "password";
    }
  </script>
</body>
</html>
