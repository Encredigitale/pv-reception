<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription vérificateur</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f7f7f7;
        }
        .container {
            max-width: 800px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }
        h1 {
            margin-top: 0;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            box-sizing: border-box;
        }
        button {
            margin-top: 25px;
            padding: 12px 20px;
            border: none;
            background: #1f4e79;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #163a5c;
        }
        .links {
            margin-top: 20px;
        }
        .links a {
            text-decoration: none;
            color: #1f4e79;
            font-weight: bold;
        }
        .note {
            margin-top: 20px;
            padding: 12px;
            background: #f3f7fb;
            border-left: 4px solid #1f4e79;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inscription d’un vérificateur habilité</h1>

        <div class="note">
            Cette page sert uniquement à l’inscription individuelle du vérificateur.
            L’accès à la liste complète des vérificateurs n’est pas public.
        </div>

        <form action="/verificateurs/nouveau" method="post" enctype="multipart/form-data">
            <label>Nom</label>
            <input type="text" name="nom" required>

            <label>Prénom</label>
            <input type="text" name="prenom" required>

            <label>Adresse mail</label>
            <input type="email" name="email" required>

            <label>Téléphone</label>
            <input type="tel" name="telephone">

            <label>Numéro du diplôme</label>
            <input type="text" name="numero_diplome" required>

            <label>Date d'obtention du diplôme</label>
            <input type="date" name="date_obtention_diplome" required>

            <label>Date d’échéance du diplôme</label>
            <input type="date" name="date_echeance_diplome" required>

            <label>Carte d'identité recto</label>
            <input type="file" name="carte_recto" accept=".jpg,.jpeg,.png,.pdf" required>

            <label>Carte d'identité verso</label>
            <input type="file" name="carte_verso" accept=".jpg,.jpeg,.png,.pdf" required>

            <label>Diplôme F0</label>
            <input type="file" name="diplome" accept=".jpg,.jpeg,.png,.pdf" required>

            <button type="submit">Enregistrer le vérificateur</button>
        </form>

        <div class="links">
            <p><a href="/">Retour au formulaire PV</a></p>
        </div>
    </div>
</body>
</html>
