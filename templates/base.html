<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Echaff{% endblock %}</title>
  <style>
    :root{
      --bg:#f5f7fb;--paper:#fff;--ink:#172033;--muted:#657085;--line:#dde4ef;
      --primary:#0f4c81;--primary2:#0b6fb3;--danger:#c0392b;--success:#1f8f55;--warning:#d9822b;
      --radius:18px;--shadow:0 14px 35px rgba(20,35,60,.08)
    }
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
    a{color:inherit}.layout{max-width:1180px;margin:0 auto;padding:24px}.topbar{background:var(--paper);border-bottom:1px solid var(--line)}
    .topbar-inner{max-width:1180px;margin:0 auto;padding:16px 24px;display:flex;gap:18px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .brand{font-size:22px;font-weight:800;color:var(--primary);text-decoration:none}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{padding:9px 12px;border-radius:999px;text-decoration:none;background:#eef4fb;color:var(--primary);font-weight:700;font-size:14px}.nav a:hover{background:#dcecf8}
    h1{font-size:32px;margin:0 0 8px}h2{font-size:22px;margin:0 0 14px}p{margin:0 0 12px}.muted{color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
    .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:18px}.card-link{text-decoration:none;display:block}.card-link:hover{transform:translateY(-1px)}
    .btn{display:inline-block;border:0;border-radius:12px;padding:10px 14px;background:var(--primary);color:white;text-decoration:none;font-weight:700;cursor:pointer;font-size:14px}.btn.secondary{background:#e9eef6;color:var(--ink)}.btn.danger{background:var(--danger)}.btn.warning{background:var(--warning)}.btn.success{background:var(--success)}
    .actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.badge{display:inline-block;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;background:#e9eef6;color:var(--ink)}.badge.archive{background:#eeeeee}.badge.actif,.badge.en_cours{background:#dff6e8;color:#12643b}.badge.cloture{background:#e8e8ff;color:#36309a}.badge.brouillon{background:#fff2d6;color:#8a5a00}.badge.en_attente_signatures{background:#ffe6e2;color:#8a241a}
    table{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{font-size:13px;color:var(--muted);background:#f8fafd}tr:last-child td{border-bottom:0}
    form{display:grid;gap:14px}.field{display:grid;gap:6px}label{font-weight:700;font-size:14px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;font:inherit;background:white}textarea{min-height:110px}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.full{grid-column:1/-1}
    .empty{padding:18px;border:1px dashed var(--line);border-radius:14px;background:#fbfcfe;color:var(--muted)}
    @media(max-width:800px){.grid,.grid-2,.form-grid{grid-template-columns:1fr}.layout{padding:16px}.topbar-inner{padding:14px 16px}h1{font-size:26px}table{font-size:14px}.hide-mobile{display:none}}
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/dashboard">Echaff</a>
      <nav class="nav">
        <a href="/dashboard">Accueil</a>
        <a href="/societe">Société</a>
        <a href="/chantiers">Chantiers</a>
        <a href="/profils">Profils</a>
        <a href="/">PV réception</a>
      </nav>
    </div>
  </header>
  <main class="layout">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
