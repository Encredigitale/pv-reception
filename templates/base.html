<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ECHAFF{% endblock %}</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --panel:#ffffff;
      --ink:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --primary:#0f172a;
      --primary2:#1d4ed8;
      --accent:#f59e0b;
      --success:#16a34a;
      --danger:#dc2626;
      --warning:#f97316;
      --soft:#eef4ff;
      --radius:20px;
      --shadow:0 20px 60px rgba(15,23,42,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--ink)}
    a{color:inherit;text-decoration:none}
    .app{display:flex;min-height:100vh}
    .sidebar{
      width:280px;background:#0b1220;color:#fff;padding:22px;
      position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column;gap:20px;z-index:20
    }
    .brand{display:flex;align-items:center;gap:12px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,.1)}
    .brand-logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#1d4ed8,#38bdf8);display:grid;place-items:center;font-weight:800}
    .brand small{display:block;color:#94a3b8;margin-top:2px}
    .nav{display:flex;flex-direction:column;gap:8px}
    .nav a{padding:12px 14px;border-radius:14px;color:#cbd5e1;display:flex;gap:10px;align-items:center}
    .nav a:hover,.nav a.active{background:rgba(255,255,255,.09);color:#fff}
    .sidebar-footer{margin-top:auto;color:#94a3b8;font-size:12px}
    .main{margin-left:280px;width:calc(100% - 280px);padding:28px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:24px}
    .topbar h1{margin:0;font-size:28px;letter-spacing:-.03em}
    .topbar p{margin:6px 0 0;color:var(--muted)}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:0;border-radius:14px;padding:11px 16px;background:var(--primary);color:#fff;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
    .btn:hover{opacity:.9}
    .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
    .btn.danger{background:var(--danger)}
    .btn.warning{background:var(--warning)}
    .btn.success{background:var(--success)}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
    .span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-6{grid-column:span 6}.span-8{grid-column:span 8}.span-12{grid-column:span 12}
    .metric{font-size:34px;font-weight:800;letter-spacing:-.04em}
    .muted{color:var(--muted)}
    .badge{display:inline-flex;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;text-transform:uppercase;background:#e2e8f0;color:#334155}
    .badge.actif,.badge.en_cours{background:#dcfce7;color:#166534}
    .badge.brouillon{background:#f1f5f9;color:#475569}
    .badge.archive{background:#e5e7eb;color:#374151}
    .badge.cloture{background:#dbeafe;color:#1e40af}
    .badge.en_attente_signatures{background:#ffedd5;color:#9a3412}
    .notif{border-radius:16px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--line);background:#fff}
    .notif.danger{border-color:#fecaca;background:#fef2f2;color:#991b1b}
    .notif.warning{border-color:#fed7aa;background:#fff7ed;color:#9a3412}
    .notif.info{border-color:#bfdbfe;background:#eff6ff;color:#1e40af}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:13px;border-bottom:1px solid var(--line);vertical-align:top}
    th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;font-size:15px;background:#fff}
    textarea{min-height:110px;resize:vertical}
    label{display:block;font-weight:800;margin:14px 0 7px}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .mobile-toggle{display:none}
    .qr-box{display:grid;place-items:center;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:18px;padding:20px}
    .qr-box img{max-width:220px;width:100%;height:auto}
    .quick-card{display:block;background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow)}
    .quick-card strong{display:block;font-size:18px;margin-bottom:6px}
    .quick-card span{color:var(--muted)}
    @media(max-width:900px){
      .mobile-toggle{display:inline-flex}
      .sidebar{transform:translateX(-100%);transition:.25s}
      .sidebar.open{transform:translateX(0)}
      .main{margin-left:0;width:100%;padding:18px}
      .grid{grid-template-columns:1fr}
      .span-3,.span-4,.span-6,.span-8,.span-12{grid-column:span 1}
      .form-grid{grid-template-columns:1fr}
      .topbar{align-items:flex-start;flex-direction:column}
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo">E</div>
        <div>
          <strong>ECHAFF</strong>
          <small>Registre échafaudage</small>
        </div>
      </div>
      <nav class="nav">
        <a href="/dashboard">🏠 Accueil</a>
        <a href="/">📄 Créer un PV</a>
        <a href="/societe">🏢 Société</a>
        <a href="/chantiers">🏗️ Chantiers</a>
        <a href="/profils">👥 Profils</a>
        <a href="/admin/verificateurs">✅ Vérificateurs</a>
      </nav>
      <div class="sidebar-footer">
        Interface terrain compatible mobile<br>
        © 2026 ECHAFF
      </div>
    </aside>

    <main class="main">
      <button class="btn secondary mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰ Menu</button>
      {% block content %}{% endblock %}
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
