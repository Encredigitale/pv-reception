{% extends "base.html" %}
{% block title %}Société - ECHAFF{% endblock %}
{% block content %}
<div class="topbar">
  <div><h1>Informations société</h1><p>Créer ou mettre à jour les informations de votre entreprise.</p></div>
</div>
<div class="card">
  <form method="post" action="/societe">
    <div class="form-grid">
      <div><label>Nom</label><input name="nom" required value="{{ societe.nom|default('') }}"></div>
      <div><label>SIRET</label><input name="siret" value="{{ societe.siret|default('') }}"></div>
      <div><label>Adresse</label><input name="adresse" value="{{ societe.adresse|default('') }}"></div>
      <div><label>Code postal</label><input name="code_postal" value="{{ societe.code_postal|default('') }}"></div>
      <div><label>Ville</label><input name="ville" value="{{ societe.ville|default('') }}"></div>
      <div><label>Pays</label><input name="pays" value="{{ societe.pays|default('France') }}"></div>
      <div><label>Téléphone</label><input name="telephone" value="{{ societe.telephone|default('') }}"></div>
      <div><label>Email</label><input type="email" name="email" value="{{ societe.email|default('') }}"></div>
      <div><label>Représentant nom</label><input name="representant_nom" value="{{ societe.representant_nom|default('') }}"></div>
      <div><label>Représentant prénom</label><input name="representant_prenom" value="{{ societe.representant_prenom|default('') }}"></div>
    </div>
    <br><button class="btn" type="submit">Enregistrer</button>
  </form>
</div>
{% endblock %}
